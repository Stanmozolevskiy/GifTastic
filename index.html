<!DOCTYPE html>
<html>
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet"

            crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" media="screen"
            href="assets/css/style.css" />

    <body>
        <div id="buttons-for-gifs">
            <button class="redyButton" data-gif="Princess Jasmine">

            <button class="redyButton" data-gif="Jafar">

            </button>
            <button class="redyButton" data-gif="Iago">
                Iago
            </button>
            <button class="redyButton" data-gif="Abu">

            </button>

                Magic Carpet
            </button>
            <button class="redyButton" data-gif="Aziz">
                Aziz
            </button>
            <button class="redyButton" data-gif="The Sultan">
                The Sultan
            </button>
            <button class="redyButton" data-gif="Farouk">
                Farouk
            </button>
            <button class="redyButton" data-gif="Aladdin">
                Aladdin

        <div id="gifs-appear-here"> </div>

        <script src="assets/javascript/maim.js"></script>
